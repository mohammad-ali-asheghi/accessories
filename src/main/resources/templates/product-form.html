<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'ویرایش محصول' : 'ایجاد محصول'">فرم محصول</title>
    <link rel="icon" type="image/png" th:href="@{/icon.png}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/product-form.css}">
</head>
<body>
<div class="form-page">
    <div class="form-card">
        <h1 th:text="${isEdit} ? 'ویرایش محصول' : 'ایجاد محصول'"></h1>

        <form th:action="${isEdit} ? @{/products/{id}/edit(id=${product.id})} : @{/products/create}"
              th:object="${product}"
              method="post"
              enctype="multipart/form-data">

            <div class="form-group">
                <label for="name">نام محصول</label>
                <input type="text" id="name" th:field="*{name}" required>
            </div>

            <div class="form-group">
                <label for="description">توضیحات</label>
                <textarea id="description" th:field="*{description}" rows="5" required></textarea>
            </div>

            <div class="form-group">
                <label for="price">قیمت</label>
                <input type="number" id="price" th:field="*{price}" required>
            </div>

            <div class="form-group">
                <label for="imageFile">تصویر محصول</label>
                <input type="file" id="imageFile" name="imageFile" accept="image/*" th:required="${!isEdit}">
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn"
                        th:text="${isEdit} ? 'ذخیره تغییرات' : 'ایجاد محصول'"></button>

                <a href="/" class="cancel-btn">بازگشت</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
