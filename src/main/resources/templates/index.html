<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>محصولات</title>
    <link rel="icon" type="image/png" th:href="@{/icon.png}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body th:attr="data-is-admin=${isAdmin}">

<div th:if="${successMessage}" class="flash-message" th:text="${successMessage}"></div>

<div class="page-header">
    <h1 class="page-title">محصولات</h1>

    <div class="header-actions">
        <div class="search-wrapper">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <label for="search-input">
                <input type="text" id="search-input" class="search-input"
                       placeholder="جستجوی محصول...">
            </label>
            <button id="search-clear" class="search-clear" style="display:none;">✕</button>
        </div>

        <a href="/login" class="create-btn" style="background: linear-gradient(135deg, #3b82f6, #2563eb);"
           th:unless="${isAdmin}">ورود به حساب کاربری</a>
        <a href="/products/create" class="create-btn" th:if="${isAdmin}">+ ایجاد محصول</a>
    </div>
</div>

<div id="product-container" class="product-grid"></div>

<div id="loader" class="loader" style="display:none;">در حال بارگذاری...</div>

<template id="product-template">
    <div class="product-card">
        <div class="image-container">
            <a href="#" class="details-link">
                <img src="" alt="product image" class="product-image">
            </a>
        </div>
        <div class="content">
            <h3 class="product-title"></h3>
            <p class="product-description"></p>
        </div>
        <div class="extra-content">
            <span class="price"></span>
        </div>
    </div>
</template>

<footer class="site-footer">
    <div class="footer-content">

        <div class="footer-section">
            <svg class="footer-icon location-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <div class="footer-text">
                <strong>آدرس فروشگاه ما:</strong>
                <span>گرگان چهارراه میدان مغازه عتیقه جات اقای محمد نودهی</span>
            </div>
        </div>

        <div class="footer-section">
            <svg class="footer-icon instagram-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            <div class="footer-text">
                <strong>در اینستاگرام همراه ما باشید:</strong>
                <a href="https://instagram.com/mhmd928787" target="_blank" dir="ltr">@mohammad_nodehi</a>
            </div>
        </div>

    </div>

    <div class="footer-bottom">
        <p>تمامی حقوق این سایت محفوظ و هرگونه کپی‌برداری پیگرد الهی دارد! © 1405</p>
    </div>
</footer>

<script src="/js/index.js"></script>
</body>
</html>
