<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>محصولات</title>
    <link rel="icon" type="image/png" th:href="@{/icon.png}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body th:attr="data-is-admin=${isAdmin}">

<div th:if="${successMessage}" class="flash-message" th:text="${successMessage}"></div>

<div class="page-header">
    <h1 class="page-title">محصولات</h1>

    <div class="header-actions">
        <div class="search-wrapper">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <label for="search-input">
                <input type="text" id="search-input" class="search-input"
                       placeholder="جستجوی محصول...">
            </label>
            <button id="search-clear" class="search-clear" style="display:none;">✕</button>
        </div>

        <a href="/login" class="create-btn" style="background: linear-gradient(135deg, #3b82f6, #2563eb);"
           th:unless="${isAdmin}">ورود به حساب کاربری</a>
        <a href="/products/create" class="create-btn" th:if="${isAdmin}">+ ایجاد محصول</a>
    </div>
</div>

<div id="product-container" class="product-grid"></div>

<div id="loader" class="loader" style="display:none;">در حال بارگذاری...</div>

<template id="product-template">
    <div class="product-card">
        <div class="image-container">
            <a href="#" class="details-link">
                <img src="" alt="product image" class="product-image">
            </a>
        </div>
        <div class="content">
            <h3 class="product-title"></h3>
            <p class="product-description"></p>
        </div>
        <div class="extra-content">
            <span class="price"></span>
        </div>
    </div>
</template>

<script src="/js/index.js"></script>
</body>
</html>
